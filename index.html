<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gary Hikes the AT | Live Tracker</title>
    <style>
        :root {
            --at-green: #2d4a22;
            --at-light-green: #a3b18a;
            --at-tan: #f0f2f0;
            --at-dark: #2d3436;
        }

        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--at-tan); 
            color: var(--at-dark); 
            line-height: 1.6;
        }

        header { 
            background: var(--at-green); 
            color: white; 
            padding: 3rem 1rem; 
            text-align: center; 
            border-bottom: 6px solid var(--at-light-green);
        }

        h1 { margin: 0; font-size: 2.2rem; letter-spacing: -1px; }
        header p { opacity: 0.9; margin: 10px 0 0; font-weight: 400; font-size: 1.1rem; }

        .container { 
            max-width: 1100px; 
            margin: -40px auto 40px; 
            padding: 0 20px; 
        }

        .stats-bar { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 15px; 
            margin-bottom: 25px; 
        }

        .stat-card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 4px solid var(--at-green);
        }

        .stat-card strong { 
            display: block; 
            color: var(--at-green); 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-val { font-size: 1.3rem; font-weight: 700; }

        .map-container { 
            width: 100%; 
            height: 70vh; 
            min-height: 500px;
            background: #fff; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            border: 1px solid #ddd; 
        }

        iframe { width: 100%; height: 100%; border: none; }

        footer { 
            text-align: center; 
            padding: 4rem 1rem; 
            color: #636e72; 
            font-size: 0.85rem; 
        }

        @media (max-width: 600px) {
            header { padding: 2rem 1rem 4rem; }
            .map-container { height: 60vh; }
        }
    </style>
</head>
<body>

<header>
    <h1>🥾 Gary Hikes the AT</h1>
    <p>Springer Mountain, GA ➔ Mt. Katahdin, ME (2,198 Miles)</p>
</header>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card">
            <strong>Current Status</strong>
            <div class="stat-val" id="update-time">Locating...</div>
        </div>

        <div class="stat-card">
            <strong>Time on Trail</strong>
            <div class="stat-val" id="days-count">Day 1</div>
        </div>

        <div class="stat-card">
            <strong>Total Elevation</strong>
            <div class="stat-val">464,500'</div>
            <div style="font-size: 0.8rem; color: #666; margin-top: 5px;">≈ 16 Mt. Everests</div>
        </div>
    </div>

    <div class="map-container">
        <iframe src="https://share.garmin.com/ggorman"></iframe>
    </div>
</div>

<footer>
    <p>Data provided by Garmin inReach Satellite Technology</p>
    <p>Created with ❤️ for Gary's thru-hike</p>
</footer>

<script>
    // AUTOMATIC UPDATES:
    // Set to March 13th so today (March 18) displays as Day 6.
    const startDate = new Date(2026, 2, 13); 
    
    function updateStats() {
        const now = new Date();
        
        // Update "Current Status" with today's date
        document.getElementById('update-time').innerText = "Live " + now.toLocaleDateString();

        // Calculate Days on Trail automatically
        const diffTime = now - startDate;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        if (diffDays > 0) {
            document.getElementById('days-count').innerText = "Day " + diffDays;
        } else {
            document.getElementById('days-count').innerText = "Starting Soon!";
        }
    }

    updateStats();
</script>

</body>
</html>
