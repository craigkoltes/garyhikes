<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gary Hikes the AT | Live Tracker</title>
    <style>
        :root {
            --at-green: #2d4a22;
            --at-light-green: #a3b18a;
            --at-tan: #f0f2f0;
            --at-dark: #2d3436;
        }

        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--at-tan); 
            color: var(--at-dark); 
            line-height: 1.6;
        }

        header { 
            background: var(--at-green); 
            color: white; 
            padding: 3rem 1rem; 
            text-align: center; 
            border-bottom: 6px solid var(--at-light-green);
        }

        h1 { margin: 0; font-size: 2.2rem; letter-spacing: -1px; }
        header p { opacity: 0.9; margin: 10px 0 20px; font-weight: 300; }

        .container { 
            max-width: 1100px; 
            margin: -40px auto 40px; 
            padding: 0 20px; 
        }

        .stats-bar { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 25px; 
        }

        .stat-card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            text-align: center; 
            border: 1px solid rgba(0,0,0,0.05);
        }

        .stat-card strong { 
            display: block; 
            color: var(--at-green); 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-val { font-size: 1.2rem; font-weight: 700; }

        .map-container { 
            position: relative; 
            width: 100%; 
            height: 70vh; 
            min-height: 500px;
            background: #fff; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            border: 1px solid #ddd; 
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-share { 
            background: var(--at-light-green); 
            color: var(--at-green); 
            border: none; 
            padding: 12px 24px; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-share:hover { 
            transform: translateY(-2px);
            background: white;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        footer { 
            text-align: center; 
            padding: 4rem 1rem; 
            color: #636e72; 
            font-size: 0.85rem; 
        }

        @media (max-width: 600px) {
            header { padding: 2rem 1rem 4rem; }
            .map-container { height: 60vh; }
        }
    </style>
</head>
<body>

<header>
    <h1>🥾 Gary Hikes the AT</h1>
    <p>Live satellite tracking: Georgia ➔ Maine</p>
    <button class="btn-share" onclick="copyLink()">🔗 Copy Tracker Link</button>
</header>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card">
            <strong>Current Status</strong>
            <div class="stat-val" id="update-time">Locating Gary...</div>
        </div>
        <div class="stat-card">
            <strong>Time on Trail</strong>
            <div class="stat-val" id="days-count">Day 1</div>
        </div>
        <div class="stat-card">
            <strong>The Destination</strong>
            <div class="stat-val">Mt. Katahdin, ME</div>
        </div>
    </div>

    <div class="map-container">
        <iframe src="https://share.garmin.com/ggorman"></iframe>
    </div>
</div>

<footer>
    <p>Data provided by Garmin inReach Satellite Technology</p>
    <p>Created with ❤️ for Gary's thru-hike</p>
</footer>

<script>
    // 1. SET THE START DATE HERE (Year, Month Index 0-11, Day)
    // Example: March 1st, 2026 is (2026, 2, 1)
    const startDate = new Date(2026, 2, 14); 
    
    function updateStats() {
        const now = new Date();
        
        // Update "Last Seen" timestamp
        document.getElementById('update-time').innerText = "Live " + now.toLocaleDateString();

        // Calculate Days on Trail
        const diffTime = now - startDate;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        if (diffDays > 0) {
            document.getElementById('days-count').innerText = "Day " + diffDays;
        } else {
            document.getElementById('days-count').innerText = "Starting Soon!";
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        const btn = document.querySelector('.btn-share');
        btn.innerText = "✅ Copied!";
        setTimeout(() => { btn.innerText = "🔗 Copy Tracker Link"; }, 2000);
    }

    updateStats();
</script>

</body>
</html>
